name: Build

on:
  schedule:
    - cron: '0 6 * * 1' # run every Monday at 6 am
  push:
    branches:
      - master
    paths:
      - 'Taskfile.yml'
      - 'Cargo.toml'
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
      - '.github/workflows/build.yml'

  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-builder
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    environment: default
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        run: pip install go-task-bin

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Test App
        run: task test

  build:
    runs-on: macos-latest
    environment: default
    needs: test
    defaults:
      run:
        shell: bash
    
    steps:
      - uses: actions/checkout@v4

      - name: Set outputs
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          
          # Determine the next version number
          LATEST_TAG=$(git tag -l "v*" | sort -V | tail -n 1)
          if [ -z "$LATEST_TAG" ]; then
            # No version tags exist, start with 1.0.0
            NEW_VERSION="1.0.0"
          else
            # Extract version number and increment minor version
            CURRENT_VERSION=$(echo $LATEST_TAG | sed 's/^v//')
            MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
            MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
            PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
            NEW_MINOR=$((MINOR + 1))
            NEW_VERSION="$MAJOR.$NEW_MINOR.0"
          fi
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "New version will be: $NEW_VERSION"

      - name: Install Task
        run: pip install go-task-bin

      - name: Update Cargo.toml with new version
        run: |
          sed -i '' 's/^version = ".*"/version = "${{ steps.vars.outputs.version }}"/' Cargo.toml
          echo "Updated Cargo.toml with version ${{ steps.vars.outputs.version }}"
          grep "^version" Cargo.toml

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build App
        run: task build

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ steps.vars.outputs.version }}
          tag_name: v${{ steps.vars.outputs.version }}
          files: |
            target/release/lastrun
            target/release/lastrun.sha256

      - name: Remove old releases
        run: task archive.releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'eveenendaal',
              repo: 'homebrew-tap',
              workflow_id: 'update-formulas.yml',
              ref: 'master'
            })
