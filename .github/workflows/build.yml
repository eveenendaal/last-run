name: Build

on:
  push:
    branches:
      - master
    paths:
      - 'Taskfile.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
      - '.github/workflows/*.yml'
      - '.github/actions/**/*.yml'

  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-builder
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  test:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.user.login == 'dependabot[bot]')
    runs-on: ubuntu-latest
    environment: default
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Setup Rust Environment
        uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: 'test-'

      - name: Test App
        run: task test

  version:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          latest_tag=$(git tag --list 'v*' --sort=-version:refname | head -1)
          current=${latest_tag#v}
          if [ -z "$current" ]; then
            current=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          fi
          IFS='.' read -r major minor patch <<< "$current"
          next="${major}.${minor}.$((patch + 1))"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          cargo_version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          sed -i "s/^version = \"$cargo_version\"/version = \"$next\"/" Cargo.toml
          echo "Bumped Cargo.toml $cargo_version -> $next (tag-based: $current -> $next)"

      - name: Setup Rust Environment
        uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: 'version-'

      - name: Update Cargo.lock
        run: cargo update --workspace

      - name: Upload patched manifests
        uses: actions/upload-artifact@v5
        with:
          name: patched-manifests
          path: |
            Cargo.toml
            Cargo.lock

  build:
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            targets: "aarch64-apple-darwin x86_64-apple-darwin"
            artifact-name: macos-binaries
          - os: ubuntu-latest
            targets: "x86_64-unknown-linux-gnu"
            artifact-name: linux-binaries
          - os: windows-latest
            targets: "x86_64-pc-windows-msvc"
            artifact-name: windows-binaries
    env:
      RELEASE_VERSION: ${{ needs.version.outputs.version }}
      TARGETS: ${{ matrix.targets }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Download patched manifests
        uses: actions/download-artifact@v6
        with:
          name: patched-manifests

      - name: Setup Rust Environment
        uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: 'release-${{ matrix.os }}-'

      - name: Build
        run: |
          mkdir -p dist
          for target in $TARGETS; do
            rustup target add "$target"
            cargo build --release --locked --target "$target"
            bin="lastrun"
            case "$target" in
              *windows*) bin="lastrun.exe" ;;
            esac
            cp "target/$target/release/$bin" "dist/$bin-$target"
            (cd dist && shasum -a 256 "$bin-$target" > "$bin-$target.sha256")
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/

  create-release:
    needs: [version, build]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6

      - name: Write VERSION file
        run: echo "${{ needs.version.outputs.version }}" > VERSION

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release v${{ needs.version.outputs.version }}
          tag_name: v${{ needs.version.outputs.version }}
          files: |
            macos-binaries/*
            linux-binaries/*
            windows-binaries/*
            VERSION

      - name: Remove old releases
        uses: actions/github-script@v9
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const toDelete = releases.data.slice(3);
            for (const release of toDelete) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });
            }
