name: Build

on:
  push:
    branches:
      - master
    paths:
      - 'Taskfile.yml'
      - 'go.mod'
      - 'go.sum'
      - '**/*.go'
      - '.github/workflows/*.yml'
      - '.github/actions/**/*.yml'

  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-builder
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    environment: default
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Test App
        run: task test

  version:
    needs: test
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          latest_tag=$(git tag --list 'v*' --sort=-version:refname | head -1)
          current=${latest_tag#v}
          if [ -z "$current" ]; then
            current=0.0.0
          fi
          IFS='.' read -r major minor patch <<< "$current"
          next="${major}.${minor}.$((patch + 1))"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "Next version: $next (from tag: ${latest_tag:-none})"

  build:
    needs: version
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.version.outputs.version }}
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache-dependency-path: 'go.sum'

      - name: Cross-compile all targets
        run: |
          mkdir -p dist
          # Pure-Go SQLite (modernc.org/sqlite) means every target builds from
          # this single Linux runner with CGO disabled.
          targets="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64"
          for target in $targets; do
            os=${target%/*}
            arch=${target#*/}
            ext=""
            [ "$os" = "windows" ] && ext=".exe"
            name="lastrun-$os-$arch$ext"
            echo "Building $name"
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 \
              go build -ldflags "-s -w -X main.version=$RELEASE_VERSION" -o "dist/$name" .
            (cd dist && sha256sum "$name" > "$name.sha256")
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: dist/

  create-release:
    needs: [version, build]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: binaries
          path: dist

      - name: Write VERSION file
        run: echo "${{ needs.version.outputs.version }}" > dist/VERSION

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release v${{ needs.version.outputs.version }}
          tag_name: v${{ needs.version.outputs.version }}
          files: |
            dist/*

      - name: Remove old releases
        uses: actions/github-script@v9
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const toDelete = releases.data.slice(3);
            for (const release of toDelete) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });
            }
