name: Build

on:
  push:
    branches:
      - master
    paths:
      - 'Taskfile.yml'
      - 'Cargo.toml'
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
      - '.github/workflows/build.yml'

  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-builder
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    environment: default
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install Tools
        uses: eveenendaal/github-actions/actions/install-my-tools@master
        with:
          include: task

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Test App
        run: task test

  build:
    runs-on: macos-15
    environment: default
    needs: test
    defaults:
      run:
        shell: bash
    
    steps:
      - uses: actions/checkout@v4

      - name: Rust Version Upgrade
        id: version
        uses: eveenendaal/github-actions/actions/rust-version-upgrade@master
        with:
          tag-prefix: 'v'
          bump: 'patch'

      - name: Install Tools
        uses: eveenendaal/github-actions/actions/install-my-tools@master
        with:
          include: task

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build App
        run: task build

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            target/release/lastrun
            target/release/lastrun.sha256
            VERSION

      - name: Remove old releases
        run: task archive.releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'eveenendaal',
              repo: 'homebrew-tap',
              workflow_id: 'update-formulas.yml',
              ref: 'master'
            })
