name: Build

on:
  push:
    branches:
      - master
    paths:
      - 'Taskfile.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
      - '.github/workflows/*.yml'
      - '.github/actions/**/*.yml'

  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-builder
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  test:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.user.login == 'dependabot[bot]')
    runs-on: ubuntu-latest
    environment: default
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Setup Rust Environment
        uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: 'test-'

      - name: Test App
        run: task test

  build:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.user.login == 'dependabot[bot]')
    runs-on: macos-latest
    environment: default
    needs: test
    defaults:
      run:
        shell: bash

    # macos-latest runners are Apple Silicon, which can also cross-compile to
    # x86_64-apple-darwin, so both macOS architectures are built from one job.
    env:
      TARGETS: "aarch64-apple-darwin x86_64-apple-darwin"

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.merge_commit_sha || github.sha }}

      - name: Rust Version Upgrade
        id: version
        uses: eveenendaal/github-actions/actions/rust-version-upgrade@master
        with:
          tag-prefix: 'v'
          bump: 'patch'

      - name: Update Cargo.lock
        run: cargo update --workspace

      - name: Setup Rust Environment
        uses: ./.github/actions/setup-rust
        with:
          cache-key-prefix: 'release-'

      - name: Build App
        run: |
          mkdir -p dist
          for target in $TARGETS; do
            task build TARGET="$target"
            cp "target/$target/release/lastrun" "dist/lastrun-$target"
            (cd dist && shasum -a 256 "lastrun-$target" > "lastrun-$target.sha256")
          done

      # Persist the bumped Cargo.toml/Cargo.lock/VERSION to master and tag the
      # release at that commit, so the source tarball (and from-source installs
      # like homebrew-core) report the release version instead of the base one.
      # Pushes made with the default GITHUB_TOKEN do not trigger new workflow
      # runs; `[skip ci]` is added as belt-and-suspenders against a build loop.
      - name: Commit version bump
        id: commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Cargo.toml Cargo.lock VERSION
          git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]"
          git push origin HEAD:master
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          name: Release v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ steps.commit.outputs.sha }}
          files: |
            dist/lastrun-aarch64-apple-darwin
            dist/lastrun-aarch64-apple-darwin.sha256
            dist/lastrun-x86_64-apple-darwin
            dist/lastrun-x86_64-apple-darwin.sha256
            VERSION

      - name: Remove old releases
        uses: actions/github-script@v9
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const toDelete = releases.data.slice(3);
            for (const release of toDelete) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });
            }

