name: App Builder

on:
  schedule:
    - cron: '0 6 * * 1' # run every Monday at 6 am
  push:
    branches:
      - master
    paths:
      - 'Taskfile.yml'
      - '**/*.go'
      - '.github/workflows/builder.yml'

  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-builder
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: macos-latest
    environment: default
    defaults:
      run:
        shell: bash
    
    steps:
      - uses: actions/checkout@v4

      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Install Task
        run: pip install go-task-bin

      - name: Cache .task and bin directories
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-apps
          path: bin

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Build, Stage, and Package Outputs
        run: task build

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.vars.outputs.sha_short }}
          tag_name: ${{ steps.vars.outputs.sha_short }}
          files: bin/*

      - name: Remove old releases
        run: task archive.releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

