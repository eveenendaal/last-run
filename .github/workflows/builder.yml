name: App Builder

on:
  schedule:
    - cron: '0 6 * * 1' # run every Monday at 6 am
  push:
    branches:
      - master
    paths:
      - 'Taskfile.yml'
      - 'Cargo.toml'
      - 'src/**/*.rs'
      - '.github/workflows/builder.yml'

  workflow_dispatch:

concurrency:
  group: ${{ github.ref }}-builder
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    environment: default
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Install Task
        run: pip install go-task-bin

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Test App
        run: task test

  build:
    runs-on: macos-latest
    environment: default
    needs: test
    defaults:
      run:
        shell: bash
    
    steps:
      - uses: actions/checkout@v4

      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Install Task
        run: pip install go-task-bin

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache bin directory
        uses: actions/cache@v4
        with:
          key: ${{ runner.os }}-apps
          path: bin

      - name: Build App
        run: task build

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.vars.outputs.sha_short }}
          tag_name: ${{ steps.vars.outputs.sha_short }}
          files: bin/*

      - name: Remove old releases
        run: task archive.releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: 'eveenendaal',
              repo: 'homebrew-tap',
              workflow_id: 'update-formulas.yml',
              ref: 'master'
            })
