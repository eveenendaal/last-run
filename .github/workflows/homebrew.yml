name: Publish to Homebrew

# Opens a version-bump pull request against homebrew/homebrew-core whenever a
# new release is published. This automates updates AFTER the formula has been
# accepted into homebrew-core for the first time (the initial submission is a
# manual PR — see packaging/homebrew/lastrun.rb).
#
# Requires a repository secret `HOMEBREW_GITHUB_TOKEN`: a personal access token
# (classic, scopes `public_repo` + `workflow`) belonging to an account that has
# forked homebrew/homebrew-core, so `brew bump-formula-pr` can push and open the PR.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to bump the formula to (e.g. v1.0.63)'
        required: true

jobs:
  homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Bump homebrew-core formula
        uses: dawidd6/action-homebrew-bump-formula@v4
        with:
          token: ${{ secrets.HOMEBREW_GITHUB_TOKEN }}
          formula: lastrun
          tag: ${{ github.event.release.tag_name || github.event.inputs.tag }}
