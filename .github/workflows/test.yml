name: Test

on:
  pull_request:
    branches:
      - 'master'
    paths:
      - 'Taskfile.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    environment: default
    defaults:
      run:
        shell: bash
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Tools
        uses: eveenendaal/github-actions/actions/install-my-tools@master
        with:
          include: task

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build App
        run: task build
