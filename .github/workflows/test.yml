name: Test

on:
  pull_request:
    branches:
      - 'master'
    paths:
      - 'Taskfile.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'src/**/*.rs'
      - 'tests/**/*.rs'
      - '.github/workflows/*.yml'
      - '.github/actions/**/*.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    environment: default
    defaults:
      run:
        shell: bash
    
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust Environment
        uses: ./.github/actions/setup-rust

      - name: Run Tests
        run: task test

      - name: Build App
        run: task build
