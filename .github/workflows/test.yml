name: Test

on:
  pull_request:
    branches:
      - 'master'
    paths:
      - 'Taskfile.yml'
      - 'go.mod'
      - 'go.sum'
      - '**/*.go'
      - '.github/workflows/*.yml'
      - '.github/actions/**/*.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    environment: default
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6

      - name: Setup Go Environment
        uses: ./.github/actions/setup-go

      - name: Run Tests
        run: task test

      - name: Build App
        run: task build
