[package]
name = "lastrun"
version = "0.2.0"
edition = "2021"
authors = ["Eric Veenendaal"]
description = "A utility to track when tasks were last run"

[dependencies]
rusqlite = "0.37"
chrono = "0.4"
clap = { version = "4.5", features = ["derive"] }
dirs = "6.0"
thiserror = "2.0"
prettytable-rs = "0.10"
clap_complete = "4.5"
serde_json = "1.0"
