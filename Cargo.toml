[package]
name = "lastrun"
version = "0.2.0"
edition = "2021"
authors = ["Eric Veenendaal"]
description = "A utility to track when tasks were last run"

[dependencies]
rusqlite = "0.36.0"
chrono = "0.4.26"
clap = { version = "4.5.38", features = ["derive"] }
dirs = "6.0.0"
thiserror = "2.0.12"
prettytable-rs = "0.10.0"
clap_complete = "4.4"
