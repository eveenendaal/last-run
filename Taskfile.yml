version: '3'

tasks:
  clean:
    desc: Clean the output directory
    cmds:
      - cargo clean
  archive.releases:
    desc: Archive the releases
    cmds:
      - |
        # Keep only the 3 most recent releases
        for i in $(gh release list --json tagName -q .[].tagName | tail -n +4); do
          gh release delete "$i" -y;
        done
  test:
    desc: Run tests
    cmds:
      - cargo test --locked
  build:
    desc: Build LastRun
    cmds:
      - cargo build --release --locked
      - cd target/release && shasum -a 256 lastrun > lastrun.sha256
  status:
    desc: Run the LastRun status TUI
    cmds:
      - cargo run --release -- status
