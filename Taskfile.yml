version: '3'

vars:
  # Release version: RELEASE_VERSION env wins, else the latest git tag, else "dev".
  VERSION:
    sh: echo "${RELEASE_VERSION:-$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo dev)}"
  LDFLAGS: -s -w -X main.version={{.VERSION}}
  SHA:
    sh: '[ "$(uname)" = "Darwin" ] && echo "shasum -a 256" || echo "sha256sum"'
  EXT: '{{if eq OS "windows"}}.exe{{end}}'

tasks:
  clean:
    desc: Remove build output
    cmds:
      - rm -rf dist

  test:
    desc: Run tests
    cmds:
      - go test ./...

  build:
    desc: Build LastRun (cross-compile with GOOS/GOARCH, e.g. GOOS=windows GOARCH=amd64 task build)
    cmds:
      - mkdir -p dist
      - CGO_ENABLED=0 go build -ldflags "{{.LDFLAGS}}" -o dist/lastrun{{.EXT}} .
      - cd dist && {{.SHA}} lastrun{{.EXT}} > lastrun.sha256

  install:
    desc: Build and install lastrun to your Go bin
    cmds:
      - |
        GOBIN="$(go env GOBIN)"
        [ -z "$GOBIN" ] && GOBIN="$(go env GOPATH)/bin"
        go build -ldflags "{{.LDFLAGS}}" -o "$GOBIN/lastrun{{.EXT}}" .

  status:
    desc: Run the LastRun status TUI
    cmds:
      - go run . status

  help:
    desc: Run the LastRun help
    cmds:
      - go run . help
